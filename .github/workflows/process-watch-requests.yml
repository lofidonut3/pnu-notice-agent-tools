name: Process web watch requests

on:
  repository_dispatch:
    types: [pnu-watch-requested]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pnu-watch-request-compiler
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PNU_DATABASE_URL: ${{ secrets.PNU_DATABASE_URL }}
      PNU_AI_PROVIDER: ${{ vars.PNU_AI_PROVIDER || 'gemini' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install request worker
        run: python -m pip install -e ".[worker]"

      - name: Compile and synchronize web requests
        run: |
          python run.py process-watch-requests \
            --db "$PNU_DATABASE_URL" \
            --provider "$PNU_AI_PROVIDER" \
            --limit 20 \
            --pretty
