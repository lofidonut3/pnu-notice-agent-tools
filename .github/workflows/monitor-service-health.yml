name: Monitor PNU Watch health

on:
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pnu-watch-health-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      PNU_DATABASE_URL: ${{ secrets.PNU_DATABASE_URL }}
      PNU_EMAIL_TO: ${{ secrets.PNU_EMAIL_TO }}
      PNU_SMTP_HOST: ${{ secrets.PNU_SMTP_HOST }}
      PNU_SMTP_PORT: ${{ vars.PNU_SMTP_PORT || '587' }}
      PNU_SMTP_FROM: ${{ secrets.PNU_SMTP_FROM }}
      PNU_SMTP_USERNAME: ${{ secrets.PNU_SMTP_USERNAME }}
      PNU_SMTP_PASSWORD: ${{ secrets.PNU_SMTP_PASSWORD }}
      PNU_SMTP_STARTTLS: ${{ vars.PNU_SMTP_STARTTLS || 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install health monitor
        run: python -m pip install -e ".[worker]"
      - name: Evaluate health and notify on new incidents
        run: |
          python run.py monitor-service \
            --db "$PNU_DATABASE_URL" \
            --operator-email "$PNU_EMAIL_TO" \
            --pretty
